name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so we can push commits and tags
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build dist
        run: npm run build

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dist to tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "build: bundle dist for ${{ steps.tag.outputs.name }} [skip ci]"
          fi
          git push origin HEAD:${{ steps.tag.outputs.name }} --force-with-lease || true

      - name: Extract major version
        id: major
        run: |
          MAJOR=$(echo "${{ steps.tag.outputs.name }}" | cut -d. -f1)
          echo "tag=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Update floating major tag (e.g. v1)
        run: |
          MAJOR_TAG="${{ steps.major.outputs.tag }}"
          git tag -f "$MAJOR_TAG"
          git push origin "$MAJOR_TAG" --force

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.name }}'
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                generate_release_notes: true,
                draft: false,
                prerelease: false,
              })
              core.info(`Created release ${tag}`)
            } catch (err) {
              if (err.status === 422) {
                core.info(`Release ${tag} already exists — skipping creation.`)
              } else {
                throw err
              }
            }
